<!DOCTYPE HTML>
<html lang="ja">

<head prefix="og: http://ogp.me/ns# fb: http://ogp.me/ns/fb# article: http://ogp.me/ns/article#">
  <meta charset="UTF-8" name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>暗記カード</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

  <div class="max-w-md mx-auto p-4">

    <!-- タイトル -->
    <h1 class="text-2xl font-bold mb-4">📊 学習ダッシュボード</h1>

    <!-- ジャンル選択 -->
    <div class="mb-4">
      <label class="text-sm text-gray-500">ジャンル</label>
      <select id="genre" class="w-full mt-1 p-2 border rounded-lg shadow-sm">
      </select>
    </div>

    <!-- 問題カード -->
    <div class="bg-white p-6 rounded-xl shadow mb-4">
      <h2 class="text-sm text-gray-400 mb-2">問題</h2>
      <p id="question" class="text-lg font-semibold"></p>
    </div>

    <!-- 答えトグル -->
    <div class="bg-white rounded-xl shadow mb-4">
      <details class="p-4">
        <summary class="cursor-pointer text-blue-600">
          答えを見る
        </summary>
        <p id="answer" class="mt-3 text-lg"></p>
      </details>
    </div>

    <!-- 評価ボタン -->
    <div class="flex gap-2 mb-4">
      <button id="correct" class="flex-1 bg-green-500 text-white p-3 rounded-lg">
        ○ わかった
      </button>

      <button id="wrong" class="flex-1 bg-red-500 text-white p-3 rounded-lg">
        × 覚えてない
      </button>
    </div>

    <!-- 次へ -->
    <button id="next" class="w-full bg-blue-600 text-white p-3 rounded-lg shadow">
      次へ
    </button>

    <!-- 学習状況 -->
    <div class="mt-6 bg-white p-4 rounded-xl shadow">
      <h3 class="font-bold mb-2">📈 学習状況</h3>
      <p>回答数: <span id="total">0</span></p>
      <p>正解数: <span id="correctCount">0</span></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
