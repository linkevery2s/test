<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Study Radar</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100">

<header class="bg-blue-600 text-white p-4 text-center text-xl font-bold">
English Study Dashboard
</header>

<div class="max-w-4xl mx-auto p-6">

<div class="bg-white rounded-xl shadow p-6">

<h2 class="text-xl font-bold mb-4 text-center">
Skill Balance
</h2>

<canvas id="radarChart"></canvas>

</div>

</div>

<script>

async function loadData(){

const res = await fetch("english-study.json")
const json = await res.json()

const labels = json.skills.map(s => s.name)
const values = json.skills.map(s => s.time)

new Chart(
document.getElementById("radarChart"),
{
type: "radar",

data:{
labels: labels,
datasets:[
{
label:"Study Time",
data: values,
backgroundColor:"rgba(59,130,246,0.2)",
borderColor:"rgba(59,130,246,1)",
borderWidth:2,
pointBackgroundColor:"rgba(59,130,246,1)"
}
]
},

options:{
responsive:true,
scales:{
r:{
beginAtZero:true,
suggestedMax:60
}
}
}

})

}

loadData()

</script>

</body>
</html>
